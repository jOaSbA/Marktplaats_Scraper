name: Marktplaats Watch

on:
  schedule:
    # Every 15 minutes. GitHub's minimum is 5 minutes, and scheduled runs can be
    # delayed under load, so don't expect to-the-second timing.
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # lets you trigger a run by hand from the Actions tab

permissions:
  contents: write # needed to commit the updated seen.json back to the repo

concurrency:
  group: marktplaats-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for new listings
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SEARCH_QUERY: "ninja creami"
          NTFY_TAGS: "ice_cream,shopping_cart"
          # NTFY_SERVER: ${{ secrets.NTFY_SERVER }}  # uncomment for self-hosted ntfy
        run: python main.py

      - name: Persist seen listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update seen listings [skip ci]"
            git push
          fi
